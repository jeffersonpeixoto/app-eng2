<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Sistema simples para abrir e listar chamados." />
  <title>Chamados de Engenharia • Simples</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="supabase.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div>
        <h1>Chamados de Engenharia</h1>
        <p>Versão simples: abrir chamado e listar chamados.</p>
      </div>
      <div class="topbar-actions">
        <button id="installButton" class="btn btn-secondary hidden" type="button">Instalar app</button>
        <button class="btn btn-secondary" type="button" onclick="carregarChamados()">Atualizar lista</button>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Abrir chamado</h2>
        <form id="ticketForm" class="form-grid">
          <div class="grid-2">
            <div class="field-group">
              <label for="nome">Nome do solicitante</label>
              <input id="nome" required placeholder="Ex.: João Silva" />
            </div>
            <div class="field-group">
              <label for="unidade">Identificação da unidade</label>
              <select id="unidade" required>
                <option value="">Selecione</option>
                <option>LOJA 9</option>
                <option>LOJA 10</option>
                <option>LOJA 11</option>
                <option>LOJA 12</option>
                <option>LOJA 13</option>
                <option>LOJA 16</option>
                <option>LOJA 17</option>
                <option>LOJA 18</option>
                <option>CD SECOS</option>
                <option>CD FRIOS</option>
                <option>CENTRO ADM</option>
              </select>
            </div>
          </div>

          <div class="grid-2">
            <div class="field-group">
              <label for="setor">Setor</label>
              <select id="setor" required>
                <option value="">Selecione</option>
                <option>Predial</option>
                <option>Elétrica</option>
                <option>Metalúrgica</option>
              </select>
            </div>
            <div class="field-group">
              <label for="gravidade">Gravidade</label>
              <select id="gravidade" required>
                <option value="">Selecione</option>
                <option>Baixa</option>
                <option>Média</option>
                <option>Alta</option>
                <option>Crítica</option>
              </select>
            </div>
          </div>

          <div class="grid-2">
            <div class="field-group">
              <label for="setorProblema">Setor do problema</label>
              <input id="setorProblema" required placeholder="Ex.: Banheiro, Quadro de energia, Soldagem" />
            </div>
            <div class="field-group">
              <label for="tipoManutencao">Tipo de manutenção</label>
              <select id="tipoManutencao" required>
                <option value="">Selecione</option>
                <option>Corretiva</option>
                <option>Preventiva</option>
                <option>Emergencial</option>
                <option>Inspeção</option>
                <option>Instalação</option>
              </select>
            </div>
          </div>

          <div class="field-group">
            <label for="descricao">Descrição detalhada</label>
            <textarea id="descricao" required placeholder="Descreva o problema encontrado."></textarea>
          </div>

          <div class="field-group">
            <label for="foto">Foto</label>
            <input id="foto" type="file" accept="image/*" capture="environment" />
          </div>

          <div class="actions">
            <button type="submit" class="btn btn-primary">Salvar chamado</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>Lista de chamados</h2>
          <input id="busca" placeholder="Buscar por unidade, setor, nome ou ID" />
        </div>
        <div id="ticketList" class="ticket-list"></div>
      </section>
    </main>
  </div>
</body>
</html>
